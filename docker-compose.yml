services:
  postgres:
    image: postgres:16-alpine
    container_name: orchestrator-postgres
    environment:
      POSTGRES_DB: orchestrator
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator -d orchestrator"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: orchestrator-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  scheduler:
    build:
      context: .
      dockerfile: scheduler-service/Dockerfile
    container_name: orchestrator-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      ORCHESTRATOR_ENVIRONMENT: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/orchestrator
      SPRING_DATASOURCE_USERNAME: orchestrator
      SPRING_DATASOURCE_PASSWORD: orchestrator
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8080:8080"

  worker-1:
    build:
      context: .
      dockerfile: worker-service/Dockerfile
    container_name: orchestrator-worker-1
    depends_on:
      - scheduler
    environment:
      SERVER_PORT: 8081
      WORKER_ID: worker-1
      ORCHESTRATOR_ENVIRONMENT: docker
      SCHEDULER_BASE_URL: http://scheduler:8080
      WORKER_PUBLIC_BASE_URL: http://worker-1:8081
      WORKER_HEARTBEAT_INTERVAL_MS: 5000
      WORKER_MAX_CONCURRENT_JOBS: 4
    ports:
      - "8081:8081"

  worker-2:
    build:
      context: .
      dockerfile: worker-service/Dockerfile
    container_name: orchestrator-worker-2
    depends_on:
      - scheduler
    environment:
      SERVER_PORT: 8081
      WORKER_ID: worker-2
      ORCHESTRATOR_ENVIRONMENT: docker
      SCHEDULER_BASE_URL: http://scheduler:8080
      WORKER_PUBLIC_BASE_URL: http://worker-2:8081
      WORKER_HEARTBEAT_INTERVAL_MS: 5000
      WORKER_MAX_CONCURRENT_JOBS: 4

  worker-3:
    build:
      context: .
      dockerfile: worker-service/Dockerfile
    container_name: orchestrator-worker-3
    depends_on:
      - scheduler
    environment:
      SERVER_PORT: 8081
      WORKER_ID: worker-3
      ORCHESTRATOR_ENVIRONMENT: docker
      SCHEDULER_BASE_URL: http://scheduler:8080
      WORKER_PUBLIC_BASE_URL: http://worker-3:8081
      WORKER_HEARTBEAT_INTERVAL_MS: 5000
      WORKER_MAX_CONCURRENT_JOBS: 4

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: orchestrator-frontend
    depends_on:
      - scheduler
    ports:
      - "5173:80"

volumes:
  postgres-data:
  redis-data:
